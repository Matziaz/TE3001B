# ============================================================
# Motor Control — Final Challenge MCR2
# ESP32 + L298N + Motor 6VDC con encoder (408 PPR)
# ============================================================
# Para ajuste en vivo:
#   ros2 param set /ctrl kp 2.0
#   ros2 param set /sp_gen signal_type 0
# ============================================================

# --- Nodo /Input: generador de set-point ---
/sp_gen:
  ros__parameters:
    sample_time:  0.1       # [s] frecuencia de publicación del set-point
    amplitude:    6.0       # [rad/s] amplitud de la señal
    omega:        0.2       # [rad/s] frecuencia angular (solo seno/cuadrada)
    signal_type:  0         # 0=seno  1=cuadrada  2=escalón  ← empieza con escalón
    pulse_duty:   0.3

# --- Nodo /Control: PID en la PC ---
# Ts recomendado: entre t95/12 y t95/10
# Con tau=0.10s aprox (motor real), t95 ~ 0.30s → Ts entre 0.025 y 0.030 s
# Se usa 0.1 s como punto de partida conservador, ajustar tras medir t95 real
/ctrl:
  ros__parameters:
    sample_time:  0.1       # [s] — igualar a sp_gen
    kp:           1.68       # Ganancia proporcional  ← AJUSTAR con escalón
    ki:           1.65       # Ganancia integral      ← AJUSTAR para cero error
    kd:           0.05       # Ganancia derivativa    ← Empezar en 0
    u_max:        15.0      # Límite superior de saturación [rad/s]
    u_min:       -15.0      # Límite inferior de saturación [rad/s]

# --- Nodo motor.py: conversión u → PWM para ESP32 ---
/motor:
  ros__parameters:
    u_max:        15.0      # Debe coincidir con u_max del controlador
    sample_time:  0.1       # [s]
    u_deadband:   0.15       # [rad/s] zona muerta (evita vibración en reposo)
    pwm_min:      0       # PWM mínimo para vencer fricción estática (0-255)
    #kick_pwm:     180       # PWM de "patada" al arrancar
    #kick_time:    0.15      # [s] duración de la patada
    pwm_slew_rate: 400.0

# --- Nodo dc_motor.py: simulador (referencia / comparación) ---
# Puedes correrlo en paralelo para comparar simulación vs real en rqt_plot
/motor_sys:
  ros__parameters:
    sample_time:        0.01
    sys_gain_K:         4.0
    sys_tau_T:          0.9
    initial_conditions: 0.0
